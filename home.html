<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHK Home</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#fff;
padding:15px;
font-size:28px;
font-weight:bold;
color:#0095f6;
text-align:center;
border-bottom:1px solid #ddd;
position:sticky;
top:0;
}

.stories{
display:flex;
overflow-x:auto;
padding:15px;
background:white;
}

.story{
margin-right:15px;
text-align:center;
}

.story img{
width:70px;
height:70px;
border-radius:50%;
border:3px solid #ff0066;
}

.feed{
padding:15px;
}

.post{
background:white;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.post img{
width:100%;
display:block;
}

.post h3{
padding:10px;
}

.actions{
display:flex;
justify-content:space-around;
padding:10px;
font-size:24px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
height:60px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #ddd;
font-size:28px;
}
</style>

</head>

<body>

<header>RHK</header>

<div class="stories">

<div class="story">
<img src="https://picsum.photos/100?1">
<p>You</p>
</div>

<div class="story">
<img src="https://picsum.photos/100?2">
<p>Alex</p>
</div>

<div class="story">
<img src="https://picsum.photos/100?3">
<p>John</p>
</div>

<div class="story">
<img src="https://picsum.photos/100?4">
<p>Emma</p>
</div>

</div>

<div class="feed">

<div class="post">
<h3>Welcome to RHK 🎉</h3>
<img src="https://picsum.photos/500/400">
<div class="actions">
<span>❤️</span>
<span>💬</span>
<span>📤</span>
</div>
</div>

</div>

<div class="bottom">

<span>🏠</span>
<span>🔍</span>
<span>➕</span>
<span>❤️</span>
<span>👤</span>

</div>

</body>
</html>
